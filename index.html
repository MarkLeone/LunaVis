<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LunaVis - WebGPU Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }
    #gpu-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #error-container {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: monospace;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <canvas id="gpu-canvas"></canvas>
  <div id="error-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
