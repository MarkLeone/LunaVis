<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LunaVis - WebGPU Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }
    #gpu-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #error-container {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: monospace;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 8px;
    }
    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      line-height: 1.6;
      background: rgba(0, 0, 0, 0.5);
      padding: 12px 16px;
      border-radius: 6px;
      pointer-events: none;
    }
    #instructions kbd {
      background: rgba(255, 255, 255, 0.15);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <canvas id="gpu-canvas"></canvas>
  <div id="error-container"></div>
  <div id="instructions">
    <strong>Controls:</strong><br>
    <kbd>Left-click + drag</kbd> Orbit<br>
    <kbd>Scroll</kbd> Zoom<br>
    <kbd>Right-click + drag</kbd> Pan
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
